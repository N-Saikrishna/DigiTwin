<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADT | Student Survey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="survey-page">

    <header class="top-nav">
        <a href="index.html" class="pill-btn">← Back</a>
        <div class="logo">Digital<span>Twin</span></div>
    </header>

    <main class="survey-container">
        <form id="adt-survey">
            <h1>Initialize Your Twin</h1>
            
            <fieldset>
                <legend>1. Academic Load (The Stressors)</legend>
                <div class="form-group">
                    <label>Total Credit Hours (this semester)</label>
                    <select name="credits">
                        <option value="12">12 Hours</option>
                        <option value="15" selected>15 Hours</option>
                        <option value="18">18+ Hours</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>STEM Density (0-6 heavy labs)</label>
                    <input type="number" min="0" max="6" value="2">
                </div>
                <div class="form-group">
                    <label>Retaking any courses?</label>
                    <div class="toggle-group">
                        <input type="radio" name="retake" value="1"> Yes
                        <input type="radio" name="retake" value="0" checked> No
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>2. Lifestyle & Habits (The Variables)</legend>
                <div class="form-group">
                    <label>Weekly Study Hours: <span id="study-val">20</span>h</label>
                    <input type="range" min="0" max="40" value="20" oninput="document.getElementById('study-val').innerText = this.value">
                </div>
                <div class="form-group">
                    <label>Sleep Consistency: <span id="sleep-val">7</span>h/night</label>
                    <input type="range" min="3" max="10" step="0.5" value="7" oninput="document.getElementById('sleep-val').innerText = this.value">
                </div>
                <div class="form-group">
                    <label>Lecture Attendance (%)</label>
                    <input type="number" min="0" max="100" value="90">%
                </div>
            </fieldset>

            <fieldset>
                <legend>3. External Commitments (The Drain)</legend>
                <div class="form-group">
                    <label>Work Hours per Week</label>
                    <input type="number" placeholder="e.g. 20">
                </div>
                <div class="form-group">
                    <label>Round-trip Commute (minutes)</label>
                    <input type="number" placeholder="30">
                </div>
            </fieldset>

            <fieldset>
                <legend>4. Historical Baseline</legend>
                <div class="form-group">
                    <label>Cumulative GPA</label>
                    <input type="number" step="0.01" min="0" max="4" placeholder="4.0">
                </div>
                <div class="form-group">
                    <label>Subject Confidence (1-10)</label>
                    <input type="range" min="1" max="10" value="7">
                </div>
            </fieldset>

            <button type="submit" class="cta-btn">Run Simulation</button>
        </form>
    </main>

</body>
</html>
