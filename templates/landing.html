<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Digital Twin | Home</title>
    <style>
        :root { 
            --ucf-gold: #ffcc00; 
            --ucf-bg: #fdfae7; 
        }
        
        body { 
            background-color: var(--ucf-bg); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333; 
            margin: 0; 
            overflow: hidden;
        }
        
        .logo-top-left { 
            position: fixed; 
            top: 20px; 
            left: 20px; 
            width: 100px; 
            z-index: 1000;
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            text-align: center; 
            padding: 0 15%; 
        }

        /* Title Hierarchy */
        .brand-main {
            font-size: 5rem; 
            color: #000; 
            margin-bottom: 20px; 
            letter-spacing: -2px;
            font-weight: 900;
            text-transform: none;
        }

        .brand-sub {
            font-size: 1.8rem;
            color: #555;
            margin-top: 10px;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        #typewriter { 
            font-size: 1.2rem; 
            line-height: 1.6; 
            min-height: 80px; 
            color: #444; 
            max-width: 700px;
            font-weight: 500; 
        }

        /* Mascot Styling */
        .mascot-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1.5s forwards 1s;
            opacity: 0;
        }

        .speech-bubble {
            position: relative;
            background: var(--ucf-gold);
            border: 2px solid #000;
            border-radius: 15px;
            padding: 12px 20px;
            margin-bottom: 15px;
            font-weight: 700;
            color: #000;
            min-width: 200px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            margin-left: -10px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: var(--ucf-gold) transparent transparent;
        }

        .knightro-img {
            width: 120px;
            height: auto;
        }
        
        .start-btn { 
            margin-top: 40px; 
            padding: 18px 45px; 
            background: #000; 
            color: var(--ucf-gold); 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 50px; 
            opacity: 0; 
            transition: transform 0.3s ease, background 0.3s ease;
            animation: fadeIn 1s forwards 4s; 
        }

        .start-btn:hover {
            transform: scale(1.05);
            background: #222;
        }

        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
    </style>
</head>
<body>
    <img src="{{ url_for('static', filename='pegasus.png') }}" class="logo-top-left" alt="UCF Pegasus">

    <div class="container">
        <h1 class="brand-main">DigiTwin</h1>
        <h2 class="brand-sub">Digital Twin Simulation</h2>
        
        <div id="typewriter"></div>

        <div class="mascot-container">
            <div id="rotating-bubble" class="speech-bubble">Welcome to DigiTwin, Knight!</div>
            <img src="{{ url_for('static', filename='knightro.png') }}" alt="Knightro" class="knightro-img">
        </div>

        <a href="/simulator" class="start-btn">INITIALIZE SIMULATION</a>
    </div>

    <script>
        // Main Introduction Text
        const introText = "Welcome to the future of academic planning. Our Digital Twin leverages your data to simulate semester outcomes in seconds. Identify risks, optimize your GPA, and protect your mental well-being with precision. Go Knights, Charge On!";
        
        let i = 0;
        function typeWriter() {
            if (i < introText.length) {
                document.getElementById("typewriter").innerHTML += introText.charAt(i);
                i++;
                setTimeout(typeWriter, 25); 
            }
        }

        // Rotating Mascot Phrases
        const phrases = [
            "Welcome to DigiTwin, Knight!",
            "Charge On! Let's build your twin.",
            "Modeling your path from Memory Mall to Graduation.",
            "Ready for the Spirit Splash? Let's check your stress.",
        ];

        let phraseIndex = 0;
        const bubble = document.getElementById('rotating-bubble');

        function rotateMascotText() {
            bubble.style.opacity = 0;
            setTimeout(() => {
                phraseIndex = (phraseIndex + 1) % phrases.length;
                bubble.innerText = phrases[phraseIndex];
                bubble.style.opacity = 1;
            }, 500);
        }

        window.onload = () => {
            typeWriter();
            // Start rotating phrases after the initial welcome
            setInterval(rotateMascotText, 4500); 
        };
    </script>
</body>
</html>
