<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADT | Student Survey</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="survey-page">
    <header class="top-nav">
        <a href="{{ url_for('home') }}" class="pill-btn">← Back</a>
    </header>

    <main class="survey-container">
        <form action="{{ url_for('run_simulation') }}" method="POST">
            <h1>Initialize Your Twin</h1>
            
            <fieldset>
                <legend>1. Academic History</legend>
                <div class="form-group">
                    <label>Current Cumulative GPA</label>
                    <input type="number" step="0.01" min="0" max="4" name="gpa" placeholder="4.0" required>
                </div>
                <div class="form-group">
                    <label>Total Failed Courses</label>
                    <input type="number" name="failed" value="0">
                </div>
                <div class="form-group">
                    <label>Total Retaken Courses</label>
                    <input type="number" name="retake" value="0">
                </div>
            </fieldset>

            <fieldset>
                <legend>2. Lifestyle & Load</legend>
                <div class="form-group">
                    <label>Work Hours per Week</label>
                    <input type="number" name="work_hours" value="0">
                </div>
                <div class="form-group">
                    <label>Self-Reported Stress Level (1-10)</label>
                    <input type="range" min="1" max="10" name="stress" value="5">
                </div>
                <div class="form-group">
                    <label>Avg Sleep Hours per Night</label>
                    <input type="number" step="0.5" name="sleep" value="7">
                </div>
            </fieldset>

            <fieldset>
                <legend>3. External Variables</legend>
                <div class="form-group">
                    <label>Semester Difficulty (1-5)</label>
                    <input type="range" min="1" max="5" name="difficulty" value="3">
                </div>
                <div class="form-group">
                    <label>Extracurricular Load (1-5)</label>
                    <input type="range" min="1" max="5" name="extra" value="1">
                </div>
            </fieldset>

            <button type="submit" class="cta-btn">Run Simulation</button>
        </form>
    </main>
</body>
</html>
