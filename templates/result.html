<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADT | Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Your Twin's Forecast</h1>
        <div class="info-card">
            <h2>Projected GPA: <span style="color: white;">{{ prediction.projected_gpa }}</span></h2>
            <p>Risk Score: {{ prediction.risk_score }}/100</p>
            <p>Burnout Probability: {{ prediction.burnout_probability }}%</p>
        </div>
        <div class="advice-section" style="max-width: 600px; margin: 0 auto; text-align: left;">
            <h3 style="color: #FFC904;">Twin Advice:</h3>
            <ul>
                {% for item in prediction.recommendations %}
                    <li>{{ item }}</li>
                {% endfor %}
            </ul>
        </div>
        <a href="{{ url_for('home') }}" class="pill-btn" style="margin-top: 30px;">Restart Simulation</a>
    </div>
</body>
</html>
