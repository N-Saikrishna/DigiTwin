<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Digital Twin | UCF</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root { --ucf-yellow: #ffcc00; --ucf-bg: #fdfae7; }
        body { background-color: var(--ucf-bg); font-family: 'Inter', sans-serif; }
        .card { background: white; padding: 2rem; border-radius: 20px; max-width: 800px; margin: 2rem auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .course-box { background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .btn { background: var(--ucf-yellow); width: 100%; padding: 1rem; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="text-align:center;">Academic <strong>Outcome Predictor</strong></h1>
        <form action="/run-simulation" method="POST">
            <label>Student Name</label>
            <input type="text" name="student_name" placeholder="Khushi" required>

            <h3 style="border-bottom: 2px solid var(--ucf-yellow); padding-bottom: 5px;">Step 1: Past Performance</h3>
            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label>Current Cumulative GPA</label>
                    <input type="number" step="0.01" name="current_gpa" required>
                </div>
                <div style="flex: 1;">
                    <label>Total Credits Earned</label>
                    <input type="number" name="total_credits_earned" required>
                </div>
            </div>

            <h3 style="border-bottom: 2px solid var(--ucf-yellow); padding-bottom: 5px;">Step 2: Current Semester (6 Courses)</h3>
            <div class="grid">
                {% for i in range(6) %}
                <div class="course-box">
                    <label>Grade</label>
                    <select name="grades[]">
                        <option value="">-</option>
                        <option value="4.0">A</option>
                        <option value="3.0">B</option>
                        <option value="2.0">C</option>
                        <option value="1.0">D</option>
                        <option value="0.0">F</option>
                    </select>
                    <label style="display:block; margin-top:10px;">Credits</label>
                    <input type="number" name="credits[]" placeholder="3">
                </div>
                {% endfor %}
            </div>

            <h3 style="border-bottom: 2px solid var(--ucf-yellow); padding-bottom: 5px;">Step 3: Lifestyle</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label>Work Hours/Week</label><input type="number" name="work_hours" value="15"></div>
                <div><label>Stress (1-10)</label><input type="number" name="stress" value="5"></div>
                <div><label>Failed Courses</label><input type="number" name="failed" value="0"></div>
            </div>

            <button type="submit" class="btn" style="margin-top:20px;">Run Forecast</button>
        </form>
    </div>
</body>
</html>
